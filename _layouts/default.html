<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <div class="site-wrapper">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-name">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/projects/' | relative_url }}">projects</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">blog</a></li>
        <li><a href="{{ '/about/' | relative_url }}">about</a></li>
        <li><a href="https://github.com/{{ site.author.github }}" target="_blank">github</a></li>
      </ul>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <span class="footer-left">{{ site.url | remove: 'https://' }}</span>
      <ul class="footer-links">
        <li><a href="https://github.com/{{ site.author.github }}" target="_blank">github</a></li>
        <li><a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank">linkedin</a></li>
        <li><a href="{{ '/resume/' | relative_url }}">resume</a></li>
      </ul>
    </footer>
  </div>
</body>
</html>
