---
layout: default
---

<article>
  <header class="post-header">
    <div class="post-meta">
      {% if page.category %}
      <div class="post-categories">
        <span class="post-category {{ page.category }}">{{ page.category }}</span>
      </div>
      {% endif %}
      {% if page.stack %}
      <span class="post-date">{{ page.stack | join: " · " }}</span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
    <p style="font-size: 17px; color: var(--color-text-secondary); margin-top: 0.75rem;">{{ page.description }}</p>
    {% endif %}
    {% if page.github %}
    <a href="{{ page.github }}" target="_blank" style="display: inline-block; margin-top: 1rem; font-family: var(--font-mono); font-size: 12px; color: var(--color-accent); border: 0.5px solid var(--color-accent); padding: 6px 14px; border-radius: 4px;">view on github →</a>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
