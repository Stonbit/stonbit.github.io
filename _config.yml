title: Stonbit
description: IT · Security · Automation
url: "https://yourusername.github.io"
baseurl: ""

author:
  name: Stonbit
  tagline: IT professional building toward offensive security.
  location: New Mexico
  github: yourusername
  linkedin: yourlinkedin

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
